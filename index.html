<!DOCTYPE html>
<html>
  <head>
    <title>mt</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/jquery.terminal/css/jquery.terminal.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery.terminal/js/jquery.terminal.min.js"></script>
    <script src="https://unpkg.com/jquery.terminal/js/autocomplete_menu.js"></script>
  </head>
  <body id="terminal">
    <script>
      let tile_names = [
        "forest",
        "dark forest",
        "taiga",
        "plains",
        "savanna",
        "badlands",
        "swamp"];

      let map_size = 7;
      
      let cave_tiles = [];

      let caves_amount = map_size;

      for (let i = 0; i < caves_amount; i++) {
        let rand1 = Math.floor(Math.random()*map_size);
        let rand2 = Math.floor(Math.random()*map_size);
        is_unique = true;
        for (let j = 0; j < cave_tiles.length; j++){
          if(cave_tiles[j][0] == rand1 && cave_tiles[j][1] == rand2){
            is_unique = false;
          }
        }
        if (is_unique){
          console.log("unique");
          cave_tiles.push([rand1,rand2]);
        } else {
          console.log("not_unique");
          i--;
        }
      }

      function add_trees(tile, base, random){
        let trees_count = Math.floor(Math.random() * random) + base;
        if (trees_count > 0){
          tile.objects.set("trees", trees_count);
        }
      }

      function get_random_tile(){
        let tile = {};
        tile.name = tile_names[Math.floor(Math.random()*tile_names.length)];
        tile.description = `Test description of ${tile.name}`;
        tile.objects = new Map();
        switch (tile.name) {
          case "forest":
          case "dark forest":
          case "taiga":
            add_trees(tile, 3, 3);
            break;
          case "savanna":
            add_trees(tile, 1, 2)
            break;
          case "plains":
          case "sawmp":
            add_trees(tile, 0, 1)
            break;
          default:
            break;
        };

        return tile;
      }

      function add_animals(tile, name, base, random) {
        let animals_count = Math.floor(Math.random() * (random+1)) + base;

        for (let i = 0; i < animals_count; i++) {
          let mob = structuredClone(mobs_repository.get(name));
          mob.name = name;
          mob.max_health = mob.health;

          tile.mobs.push(mob);
        }
      }

      function spawn_animals(){
        for (let row = 0; row < map_size; row++) {
          for (let column = 0; column < map_size; column++) {
            let tile = map[0][row][column];
            tile.mobs = [];
            switch (tile.name) {
              case "forest":
              case "dark forest":
                break;
              case "taiga":
                add_animals(tile, "fox", 1, 1);
                break;
              case "savanna":
                add_animals(tile, "pig", 1, 1);
                add_animals(tile, "cow", 2, 2);
                break;
              case "plains":
                add_animals(tile, "pig", 2, 3);
                add_animals(tile, "cow", 1, 2);
                break;
              case "sawmp":
              default:
                break;
            };
          }
        }
      }

      let mobs_repository = new Map([
        ["pig", {health: 8, damage: 0, death_drop: [["raw_pork", 2]]}],
        ["cow", {health: 10, damage: 0, death_drop: [["raw_beef", 3]]}],
        ["fox", {health: 6, damage: 1, death_drop: [["emerald", 1]]}],
      ]);


      let map = [];
      let map_layers = 3;

      for (let layer=0; layer < map_layers; layer++){
        map[layer] = []
        for (let row = 0; row < map_size; row++) {
          map[layer][row] = [];
          for (let column = 0; column < map_size; column++) {

            let tile = {};

            if (layer == 1){
              tile.name = "cave";
              tile.description = "There is a lot of [[;black;white]stone] around you";
            } else {
              let add_cave = false;
  
              for (let i = 0; i < caves_amount; i++) {
                if (cave_tiles[i][0] == row && cave_tiles[i][1] == column){
                  add_cave = true;
                }
              }
              tile = get_random_tile();
    
              if (add_cave){
                tile.objects.set("cave", true);
                console.log("cave");
              }
            }
  
            
            
            map[layer][row][column] = tile;
          }
        }
      }
      
      let day_lenght = 5;
      let night_lenght = 5;

      let time = 0;

      

      let player = { pos: { x: 0, y: 0, z: 0 }, health: 100, hunger: 20, name: "player", 
      inventory: {items: new Map, equipment: new Map, 
        add: function(item, amount){
          if (!player.inventory.items.has(item)){
          player.inventory.items.set(item, 0);
        }
        player.inventory.items.set(item, player.inventory.items.get(item)+amount);
        }},
      
      durabilities: new Map};

      let crafts = new Map([
        ["planks", {amount: 4, resources: [["logs", 1]], is_crafting_table_required: false}],
        ["sticks", {amount: 4, resources: [["planks", 2]], is_crafting_table_required: false}],
        ["crafting_table", {amount: 1, resources: [["planks", 4]], is_crafting_table_required: false}],
        ["furnace", {amount: 1, resources: [["cobble_stone", 8]], is_crafting_table_required: true}],
        ["wooden_pickaxe", {amount: 1, resources: [["planks", 3],["sticks", 2]], is_crafting_table_required: true}],
      ]);

      let equipment_repository = new Map([
          ["wooden_pickaxe", {durability: 3, damage: 2, mine_level: 1}],
      ]);

      function tick() {
        time += 1;
        if (time == day_lenght) {
          term.echo("[[b;#f90;]Sun is starting to set]");
        } else if (time == -1) {
          term.echo("[[b;#f90;]Sun is starting to rise]");
        } else if (time == 0) {
          term.echo("[[b;#0f0;]Day begins]");
        } else if (time > day_lenght) {
          term.echo("[[b;#f00;]Night begins]");
          time = night_lenght * -1;
        }
      }

      // function fix_pos() {
      //   if (player.pos.x < 0) {
      //     player.pos.x += 3;
      //   } else if (player.pos.x >= map[0].length) {
      //     player.pos.x -= map[0].length;
      //   }
      //   if (player.pos.y < 0) {
      //     player.pos.y += 3;
      //   } else if (player.pos.y >= map.length) {
      //     player.pos.y -= map.length;
      //   }
      // }

      function check_if_out_of_bounds(object){
        if (object.x < 0) {
          return true;
        } else if (object.x >= map[0][0].length) {
          return true;
        }
        if (object.y < 0) {
          return true;
        } else if (object.y >= map[0].length) {
          return true;
        }

        return false;
      }

      player.pos.y = Math.floor(map[0].length/2)
      player.pos.x = Math.floor(map[0][0].length/2)

      function get_translation_from_direction(direction) {
        let translation = { x: 0, y: 0 , z: 0};

        if(directions_north.includes(direction)){
          translation.y += 1;
        } else if (directions_east.includes(direction)){
          translation.x += 1;
        } else if (directions_south.includes(direction)){
          translation.y -= 1;
        } else if (directions_west.includes(direction)){
          translation.x -= 1;
        } else if (directions_up.includes(direction)){
          translation.z += 1;
        } else if (directions_down.includes(direction)){
          translation.z -= 1;
        } else {
          return "error";
        }
        return translation;
      }
      spawn_animals();
      let term;
      jQuery(function ($, undefined) {
        term = $("#terminal").terminal(
          function (command) {
            let current_tile = map[Math.abs(player.pos.z)][player.pos.y][player.pos.x];
            if (command === "help") {
              term.echo("Available commands: status, walk [direction], run [direction], look [direction]");

            } else if (command === "status") {
              term.echo(`You are in ${current_tile.name}`);
              term.echo(`You have [[;red;]${player.health}/100] health and [[;yellow;]${player.hunger}/20] hunger`);

            } else if (command === "inventory") {
              term.echo("[[b;;]Items:]")
              for (let [key, val] of player.inventory.items.entries()){
                if (val != 0){
                  term.echo(`- ${key}: ${val}`);
                }
              }
              term.echo("[[b;;]Equipment:]")
              for (let [name, val] of player.inventory.equipment.entries()){
                let output = "";

                let propertie_names = Object.keys(val);
                let properties = Object.values(val);

                for (let propertie_num in properties) {
                  let propertie_name = propertie_names[propertie_num];
                  let propertie = properties[propertie_num];

                  if (output.length > 0){
                    output += "; ";
                  }
                  output += `${propertie_name}: ${propertie}`
                  
                }

                term.echo(`- ${name}: ${output}`);
                // if (val.count != 0){
                //   term.echo(`${name}: ${val}`);
                // }
              }


            } else if (command === "pos" || command === "position") {
              term.echo(`You are at x: ${player.pos.x}, y: ${player.pos.y}, z: ${player.pos.z}`);

            } else if (command.startsWith("name ")) {
              let name = command.split(" ")[1];
              player.name = name;

            } else if (command.startsWith("go ") || command.startsWith("move ")) {
              term.echo("Do you mean walk or run?");

            } else if (command.startsWith("walk ") || command.startsWith("run ") || command.startsWith("look ")) {
              let direction = command.split(" ")[1];
              if (direction == "around"){
                look_around();
                return;
              }
              let translation = get_translation_from_direction(direction);
              if (translation === "error"){
                term.echo(`[[;red;]I don't know direction ${direction}]`);
                return;
              } else {
                let translated_x = player.pos.x + translation.x;
                let translated_y = player.pos.y + translation.y;
                let translated_z = player.pos.z + translation.z;
                if (check_if_out_of_bounds({x: translated_x, y: translated_y})){
                  if (command.startsWith("look")){
                    term.echo("You see the world border");
                  } else {
                    term.echo("[[;red;]You can not cross the world border]");
                  }
                  return;
                } else{
                  if (player.pos.z == 0 && translation.z == 1){
                    if (command.startsWith("look")){
                      term.echo(`[[;blue;white]You see a beautiful blue sky]`);
                    } else {
                      term.echo(`[[;red;]You can't go any higher]`);
                    }
                  } else if (player.pos.z == 0 && translation.z == -1){
                    if (current_tile.objects.get("cave") == true) {
                      if (command.startsWith("look")){
                        term.echo(`You look down the dark cave entrance, which extends far into pitch-black darkness with no sunlight being able to reach it`);
                      } else {
                        term.echo(`You go down the cave entrance`);
                        player.pos.z = translated_z;
                        tick();
                      }
                    } else {
                      if (command.startsWith("look")){
                        term.echo(`You see the ground beneath your feet`);
                      } else {
                        term.echo(`[[;red;]Minecraft rule number 1:] [[;black;red]never dig straight down]`);
                      }
                    }
                  } else if (player.pos.z == -1 && translation.z == 1){
                    if (command.startsWith("look")){
                      term.echo(`[[;blue;white]You see the surface through the cave exit]`);
                    } else {
                      term.echo(`You climb out of the cave and return to the surface.`);
                      player.pos.z = translated_z;
                      tick();
                    }
                  } else if (player.pos.z == -1 && translation.z == -1){
                    if (command.startsWith("look")){
                      term.echo(`You look down into the dark abyss of the cave, venturing further will require a [[;black;white]light source] to illuminate the way`);
                    } else {
                      term.echo(`Despite the complete [[;black;white]darkness], you continue to descend deeper into the cave`);
                      player.pos.z = translated_z;
                      tick();
                    }
                  } else if (player.pos.z == -1){
                    if (command.startsWith("look")){
                      term.echo(`You see the cave wall`);
                    } else {
                      term.echo(`[[;red;]The cave wall blocks the way]`);
                    }
                  } else {
                    if (command.startsWith("look")){
                      term.echo(`You see a ${map[Math.abs(player.pos.z)][translated_y][translated_x].name}`);
                    } else {
  
                      player.pos.x = translated_x;
                      player.pos.y = translated_y;
                      term.echo(`You are now in a ${map[Math.abs(player.pos.z)][player.pos.y][player.pos.x].name}`);
                      tick();
                    }
                  }
                }
              }

            } else if (command.startsWith("punch ") || command.startsWith("chop ")) {
              let action = command.split(" ")[0];
              let object = command.split(" ")[1];

              if (object == "down"){
                object = command.split(" ")[2];
                term.echo("You don't have to say \"down\"")
              }

              
              let tile_objects = current_tile.objects;
              if (object == "tree"){
                if(tile_objects.has("trees")){
                  let trees_count = tile_objects.get("trees")
                  if (trees_count > 0){
                    tile_objects.set("trees", trees_count-1);
                    term.echo("You cut down a tree and 3 logs");
                    player.inventory.add("logs", 3);
                    if(trees_count-1 <= 0){
                      current_tile.name = `deforested ${current_tile.name}`;
                    }
                  } else {
                    term.echo(`[[;red;]There are no more trees left here]`);
                  }
                } else {
                  term.echo(`[[;red;]There are no trees around you]`);
                }
              } else if (object == "trees"){
                term.echo(`[[;red;]All at once?]`);
              } else {
                term.echo(`[[;red;]You can't ${action} ${object}]`);
              }
            } else if (command.startsWith("inspect")) {
              look_around();
            } else if (command.startsWith("craft ")) {
              object = command.substring(6);
              if (crafts.has(object)){

                let craft_object = crafts.get(object);
                if (craft_object.is_crafting_table_required){
                  if (!current_tile.crafting_talbe == true) {
                    term.echo(`[[;#f00;]You need a crafting table to craft ${object}]`);
                    return;
                  } else {
                    
                  }
                }

                let can_craft = true;
                let required_resources = craft_object.resources;

                for (let i in required_resources){
                  let resource = required_resources[i][0];
                  let amount = required_resources[i][1];

                  if (!player.inventory.items.has(resource)){
                    player.inventory.items.set(resource, 0);
                  }

                  if (player.inventory.items.get(resource) < amount){
                    term.echo(`[[;red;]Not enought ${resource} you need ${amount-player.inventory.items.get(resource)} more]`);
                    can_craft = false;
                  }
                }

                if (can_craft){
                  if (!player.inventory.equipment.has(object)){
                    for (let i in required_resources){
                      let resource = required_resources[i][0];
                      let amount = required_resources[i][1];
                      player.inventory.items.set(resource, player.inventory.items.get(resource)-amount);
                    }
                  }

                  let crafted_amount = craft_object.amount;
                  if (equipment_repository.has(object)){
                    if (player.inventory.equipment.has(object)){
                      term.echo(`[[;red;]You already have ${object}]`);
                    } else {
                      player.inventory.equipment.set(object, structuredClone(equipment_repository.get(object)));
                    }

                  } else {
                    if (!player.inventory.items.has(object)){
                      player.inventory.items.set(object, crafted_amount);
                    } else {
                      player.inventory.items.set(object, player.inventory.items.get(object) + crafted_amount);
  
                    }
                  }
                  term.echo(`You crafted ${crafted_amount} ${object}`);
                }

              } else {
                term.echo(`[[;red;]It is not possible to craft: ${object}]`);
              }
            } else if (command.startsWith("attack ")) {
              let actions = command.split(" ")[0];
              let target = command.split(" ")[1];

              let mob_name = target.split("_")[0];
              let mob_number_choice = parseInt(target.split("_")[1])-1;

              let damage = 1;

              let mob_count = 0;

              for (let i in current_tile.mobs) {
                let mob = current_tile.mobs[i];

                console.log(mob);
                console.log(`${mob_name} ${mob.name}`);

                if (mob.name == mob_name){
                  console.log("TRUE")
                  if (mob_count == mob_number_choice){
                    mob.health -= damage;
                    term.echo(`You dealt ${damage} to ${mob.name}_${mob_count+1} it's health is [[;#f00;]${mob.health}/${mob.max_health}]`);
                    if (mob.health <= 0){
                      term.echo(`${mob.name} was killed by ${player.name}`);
                      for (let drop_number in mob.death_drop) {
                        let drop = mob.death_drop[drop_number];
                        let drop_item = mob.death_drop[drop_number][0];
                        let drop_amount = mob.death_drop[drop_number][1];
                        term.echo(`You got ${drop_amount} ${drop_item}`);

                        player.inventory.add(drop_item, drop_amount);
                      }
                      current_tile.mobs.splice(i, 1);
                    }
                    tick();
                    return;
                  } else {
                    mob_count += 1;
                  }
                }
              }

              // current_tile.mobs 
            }else if (command.startsWith("place ")) {
              let actions = command.split(" ")[0];
              let object = command.split(" ")[1];
              if (player.inventory.items.get(object) > 0){
                if (object == "crafting_table") {
                  if (current_tile.object.get("crafting_table") == true){
                    term.echo("[[;#f00;]Crafting table is already placed here]");
                     
                  } else {
                    current_tile.object.set("crafting_table", ture);
                    player.inventory.items.set(object, player.inventory.items.get(object)-1);
                    term.echo("Placed down a crafting table");
                  }
                }
              } else {
                term.echo(`[[;red;]You do not have ${object}]`)
              }

            } else {
              term.echo("[[;red;]Command not found: " + command + "]");
            }
          },
          {
            greetings: "mt",
            prompt: ">>> ",
            autocompleteMenu: true,
            // completion: ['help', 'run', 'walk', 'status', 'inventory', 'look', 'craft'],
            completion: function() {
              let command = term.before_cursor();
              if (command.startsWith("run ") || command.startsWith("walk ") || command.startsWith("look ")){
                if (command.startsWith("look ")){
                  return directions.concat("around");
                } else {
                  return directions;
                }
              } else if (command.startsWith("craft ")) {
                return Array.from(crafts.keys());
              } else if (command.startsWith("chop ") || command.startsWith("punch ")) {
                return ["tree"];
              } else {
                return ['help', 'run', 'walk', 'status', 'inventory', 'look', 'craft', 'chop', 'punch'];
              }
            },
            // completionEscape: false,
          }
        );
      });

      let directions_north = ["north", "forward", "forwards", "onward", "onwards"];
      let directions_east = ["east", "right"];
      let directions_south = ["south", "back", "backwards"];
      let directions_west = ["west", "left", "backwards"];
      let directions_down = ["down", "bellow"];
      let directions_up = ["up", "above"];

      let directions = directions_north.concat(directions_east.concat(directions_south.concat(directions_west)));

      function look_around(){
        let tile = map[Math.abs(player.pos.z)][player.pos.y][player.pos.x];
        term.echo(`You are in ${tile.name}`);
        term.echo(`${tile.description}`);
        if (tile.objects.has("trees")){
          if (tile.objects.get("trees") > 0){
            term.echo(`You see ${tile.objects.get("trees")} trees`);
          }
        }
        if (tile.crafting_talbe == true){
          term.echo(`There is a crafting table`);
        }
        if (tile.objects.get("cave") == true){
          term.echo("You see a [[;black;white]cave] entrance");
        }
        if (tile.mobs.length > 0){
          
          term.echo("[[b;;]Mobs:]");
          let mob_count = [];
  
          for (let mob_number in tile.mobs) {
            let mob = tile.mobs[mob_number];
  
            if (mob_count[mob.name] == undefined){
              mob_count[mob.name] = 1;
            } else {
              mob_count[mob.name] += 1;
            }
  
            term.echo(`- ${mob.name}_${mob_count[mob.name]} [[;#f00;]${mob.health}/${mob.max_health}]`);
            
            
          }
        
        }
      }
    </script>
  </body>
</html>
